<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xray 3x-ui智能匹配系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1f2937; margin-top: 0; margin-bottom: 20px; }
        
        /* 卡密验证区域样式 */
        .auth-section { background-color: #eff6ff; border: 1px solid #bfdbfe; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .auth-section label { margin-bottom: 0; color: #1e3a8a; font-weight: bold; white-space: nowrap; }
        .auth-section input { flex: 1; padding: 10px; border: 1px solid #93c5fd; border-radius: 6px; outline: none; font-size: 16px; font-family: monospace; color: #1e3a8a; }
        .auth-section input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 768px) { .input-grid { grid-template-columns: 1fr; } }
        
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; color: #4b5563; }
        textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-family: monospace; font-size: 13px; resize: vertical; background-color: #fafafa; }
        textarea:focus { border-color: #3b82f6; outline: none; background-color: #fff; }
        
        button.generate-btn { background-color: #3b82f6; color: white; border: none; padding: 14px 24px; font-size: 18px; border-radius: 6px; cursor: pointer; transition: background-color 0.2s; width: 100%; font-weight: bold; box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3); }
        button.generate-btn:hover { background-color: #2563eb; }
        
        .output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        @media (max-width: 768px) { .output-grid { grid-template-columns: 1fr; } }
        
        .output-box { position: relative; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: background-color 0.2s; }
        .copy-btn:hover { background: #059669; }
        
        .status-msg { margin-top: 15px; text-align: center; font-weight: bold; color: #059669; height: 20px; }
        .error-msg { color: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Xray 3x-ui智能匹配系统</h1>

    <div class="auth-section">
        <label for="authCode">🔐 授权卡密：</label>
        <input type="password" id="authCode" placeholder="请输入您的专属授权卡密..." autocomplete="off">
    </div>

    <div class="input-grid">
        <div class="form-group">
            <label for="vlessLinks">1️⃣ 填入 VLESS 链接 (自动提取对应名称及IP)</label>
            <textarea id="vlessLinks" rows="8" placeholder="vless://xxxx@xx.com:443?...#%E7%BE%8E%E5%9B%BD38.241.56.22"></textarea>
        </div>

        <div class="form-group">
            <label for="socksNodes">2️⃣ 填入 SOCKS5 IP信息 (IP:端口:账号:密码)</label>
            <textarea id="socksNodes" rows="8" placeholder="38.241.56.22:7093:user:pass"></textarea>
        </div>
    </div>

    <button class="generate-btn" onclick="generateConfig()">⚡ 验证卡密并生成规则</button>
    <div id="statusMessage" class="status-msg"></div>

    <div class="output-grid">
        <div class="output-box">
            <label>3️⃣ 出站规则 (Outbounds)</label>
            <button class="copy-btn" onclick="copyText('outbounds')">复制</button>
            <textarea id="outbounds" rows="18" readonly placeholder="出站规则将在这里生成..."></textarea>
        </div>
        
        <div class="output-box">
            <label>4️⃣ 路由规则 (Routing Rules)</label>
            <button class="copy-btn" onclick="copyText('routing')">复制</button>
            <textarea id="routing" rows="18" readonly placeholder="纯净版路由规则将在这里生成..."></textarea>
        </div>
    </div>
</div>

<script>
    // ✅ 在这里设置你的全局无限次卡密
    const VALID_KAMI = "bx666";

    // 页面加载时，尝试读取本地缓存的卡密
    window.onload = function() {
        const savedCode = localStorage.getItem("xray_auth_code");
        if (savedCode) {
            document.getElementById('authCode').value = savedCode;
        }
    };

    function generateConfig() {
        const statusMsg = document.getElementById('statusMessage');
        const authCode = document.getElementById('authCode').value.trim();

        // 1. 卡密验证逻辑
        if (authCode !== VALID_KAMI) {
            statusMsg.textContent = "❌ 验证失败：卡密无效或已过期！请联系管理员。";
            statusMsg.className = "status-msg error-msg";
            alert("❌ 卡密错误，拒绝访问！");
            return; // 终止执行
        } else {
            // 验证通过，将卡密存入本地浏览器缓存，下次打开自动填充
            localStorage.setItem("xray_auth_code", authCode);
        }

        const vlessText = document.getElementById('vlessLinks').value.trim();
        const socksText = document.getElementById('socksNodes').value.trim();
        
        if (!vlessText || !socksText) {
            statusMsg.textContent = "❌ 请确保 VLESS 链接和 SOCKS5 节点信息都已填写！";
            statusMsg.className = "status-msg error-msg";
            return;
        }

        // 2. 解析 VLESS 链接提取名字
        const ipToNameMap = {};
        const ipRegex = /\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b/;
        
        const vlessLines = vlessText.split('\n');
        vlessLines.forEach(line => {
            line = line.trim();
            if (!line) return;
            const hashIndex = line.indexOf('#');
            if (hashIndex !== -1) {
                const encodedName = line.substring(hashIndex + 1);
                try {
                    const decodedName = decodeURIComponent(encodedName);
                    const ipMatch = decodedName.match(ipRegex);
                    if (ipMatch) ipToNameMap[ipMatch[0]] = decodedName;
                } catch (e) {}
            }
        });

        // 3. 解析 SOCKS5 并匹配
        const outbounds = [];
        const routing = [];
        const socksLines = socksText.split('\n');
        let matchCount = 0;
        let mismatchCount = 0;

        socksLines.forEach(line => {
            line = line.trim();
            if (!line) return;
            
            const parts = line.split(':');
            if (parts.length >= 4) {
                const ip = parts[0];
                const port = parseInt(parts[1]);
                const user = parts[2];
                const pass = parts[3];

                let tagName = ipToNameMap[ip];
                if (tagName) {
                    matchCount++;
                } else {
                    tagName = ip; 
                    mismatchCount++;
                }

                outbounds.push({
                    tag: tagName,
                    protocol: "socks",
                    settings: {
                        servers: [{ address: ip, port: port, users: [{ user: user, pass: pass }] }]
                    }
                });

                routing.push({
                    type: "field",
                    user: [tagName],
                    outboundTag: tagName
                });
            }
        });

        // 4. 渲染输出
        document.getElementById('outbounds').value = JSON.stringify(outbounds, null, 2);
        document.getElementById('routing').value = JSON.stringify(routing, null, 2);

        if (mismatchCount === 0) {
            statusMsg.textContent = `✅ 卡密验证通过！完美匹配生成 ${matchCount} 条节点的专属规则。`;
            statusMsg.className = "status-msg";
        } else {
            statusMsg.textContent = `⚠️ 卡密验证通过！生成 ${matchCount} 条，但有 ${mismatchCount} 个 SOCKS IP 未在 VLESS 中找到对应名字。`;
            statusMsg.className = "status-msg error-msg";
        }
    }

    function copyText(elementId) {
        const textarea = document.getElementById(elementId);
        if (!textarea.value) return;
        textarea.select();
        document.execCommand('copy');
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = '✅ 已复制';
        btn.style.backgroundColor = '#047857';
        setTimeout(() => { btn.innerText = originalText; btn.style.backgroundColor = '#10b981'; }, 1500);
    }
</script>

</body>
</html>
